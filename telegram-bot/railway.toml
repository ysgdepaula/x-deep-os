# Railway deployment config
# Deploy via: railway up, or connect the repo in Railway dashboard
# https://docs.railway.app/reference/config-as-code

[build]
builder = "NIXPACKS"
buildCommand = "npm ci"

[deploy]
startCommand = "npm start"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Required environment variables (add them in Railway UI or via `railway variables set`)
# - TELEGRAM_BOT_TOKEN
# - TELEGRAM_USER_ID
# - ANTHROPIC_API_KEY
# - OPENAI_API_KEY
# - REDIS_URL (attach a Redis plugin in Railway)
# - GITHUB_TOKEN, GITHUB_REPO_OWNER, GITHUB_REPO_NAME
# - DEEP_NAME, USER_NAME
#
# See .env.example for the full list.
